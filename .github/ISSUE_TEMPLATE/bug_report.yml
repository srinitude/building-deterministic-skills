name: Bug report
description: Report something wrong in the skill, a validator, or the grounding artifacts
title: "[bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. For security-sensitive issues, use the
        Security tab instead (see SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: e.g. check-source-grounding.py reports a coverage mismatch for ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands and any minimal SKILL.md / script snippet.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Python version, Hermes version (if relevant).
      placeholder: macOS 26.4, Python 3.11, hermes 1.x
    validations:
      required: false
