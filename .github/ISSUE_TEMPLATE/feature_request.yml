name: Feature or content request
description: Suggest an improvement to the methodology, references, or validators
title: "[feat]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's missing or could be better?
      description: Describe the gap. Source-grounded suggestions are best.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source grounding
      description: Cite the agentskills.io source that supports the change, if applicable.
    validations:
      required: false
